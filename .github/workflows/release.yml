name: Release

on:
  push:
    tags:
      - 'v*'        # triggers on any tag like v0.4.1, v1.0.0, etc.

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_DIR: C:\cargo-target
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'fkhost ${{ github.ref_name }}'
          releaseBody: |
            ## fkhost ${{ github.ref_name }}

            Expose your local server to the internet in seconds — no config, no friction.

            ### Install
            Download and run the `.exe` installer below.

            ### Requirements
            - Windows 10 / 11 (64-bit)
            - No extra software needed — cloudflared is downloaded automatically on first run.
          releaseDraft: false
          prerelease: false
